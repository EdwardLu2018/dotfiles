
[env]
TERM = "xterm-256color"

[font]
size = 10

[window]
opacity = 0.99
padding = { x = 5, y = 5 }
dimensions = { columns = 200, lines = 70 }

[bell]
animation = "EaseOutExpo"
duration = 0

# Gruvbox color scheme
[colors.cursor]
cursor = "#928374"
text = "#282828"

[colors.primary]
foreground = "#ebdbb2"
background = "#282828"

[colors.selection]
foreground = "#928374"
background = "#ebdbb2"

[colors.normal]
black   = "#665c54"
red     = "#cc241d"
green   = "#98971a"
yellow  = "#d79921"
blue    = "#458588"
magenta = "#b16286"
cyan    = "#689d6a"
white   = "#a89984"

[colors.bright]
black   = "#7c6f64"
red     = "#fb4934"
green   = "#b8bb26"
yellow  = "#fabd2f"
blue    = "#83a598"
magenta = "#d3869b"
cyan    = "#8ec07c"
white   = "#bdae93"

[cursor.style]
shape = "Block"
blinking = "On"

[cursor]
blink_interval = 500

[hints]
alphabet = "jfkdls;ahgurieowpq"

[[hints.enabled]]
command = "xdg-open"
hyperlinks = true
post_processing = true
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`]+"

[hints.enabled.binding]
key = "U"
mods = "Control|Shift"

[hints.enabled.mouse]
enabled = true
mods = "None"

[keyboard]
bindings = [
  { key = "W", mods = "Control|Shift", action = "Quit" },
  { key = "N", mods = "Control|Shift", action = "CreateNewWindow" },
]

[general]
live_config_reload = true
